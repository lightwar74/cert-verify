<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QR Сканер Сертификатов</title>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f0f0f0; margin: 0; padding: 20px; }
        #reader { width: 100%; max-width: 500px; margin: 0 auto; border-radius: 12px; overflow: hidden; }
        #result { margin-top: 20px; padding: 15px; background: white; border-radius: 8px; display: none; word-break: break-all; }
        .btn { display: inline-block; margin-top: 15px; padding: 12px 24px; background: #007bff; color: white; text-decoration: none; border-radius: 6px; font-weight: bold; }
    </style>
</head>
<body>
    <h2>📷 Сканер сертификатов</h2>
    <div id="reader"></div>
    <div id="result">
        <strong>Результат:</strong><br>
        <span id="resultText"></span><br>
        <a id="openLink" class="btn" href="#" target="_blank">Открыть ссылку</a>
        <button class="btn" onclick="location.reload()" style="background:#6c757d; margin-left:10px;">Сканировать снова</button>
    </div>

    <script>
        function onScanSuccess(decodedText, decodedResult) {
            // Останавливаем сканирование после успешного считывания
            html5QrcodeScanner.clear();
            
            document.getElementById('result').style.display = 'block';
            document.getElementById('resultText').innerText = decodedText;
            
            // Если это ссылка, делаем кнопку активной
            if (decodedText.startsWith('http')) {
                document.getElementById('openLink').href = decodedText;
                document.getElementById('openLink').style.display = 'inline-block';
            } else {
                document.getElementById('openLink').style.display = 'none';
            }
        }

        function onScanFailure(error) {
            // Игнорируем ошибки кадров, пока QR-код не найден
        }

        let html5QrcodeScanner = new Html5QrcodeScanner(
            "reader", { fps: 10, qrbox: { width: 250, height: 250 } }, /* verbose= */ false);
        html5QrcodeScanner.render(onScanSuccess, onScanFailure);
    </script>
</body>
</html>
